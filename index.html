<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simon Guitare</title>
    <style>
        :root {
            --red: #FF4136;
            --blue: #0074D9;
            --yellow: #FFDC00;
            --green: #2ECC40;
            --bg: #111;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            position: relative;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90vmin;
            height: 90vmin;
            max-width: 500px;
            max-height: 500px;
        }

        .pad {
            border-radius: 20%;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .pad::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.1s;
        }

        .pad.active::after {
            opacity: 1;
        }

        .pad.active {
            filter: brightness(1.5) saturate(1.2);
            transform: scale(0.98);
        }

        .red { background-color: var(--red); }
        .blue { background-color: var(--blue); }
        .yellow { background-color: var(--yellow); }
        .green { background-color: var(--green); }

        .red.active { box-shadow: 0 0 40px var(--red); }
        .blue.active { box-shadow: 0 0 40px var(--blue); }
        .yellow.active { box-shadow: 0 0 40px var(--yellow); }
        .green.active { box-shadow: 0 0 40px var(--green); }

        .center-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25%;
            height: 25%;
            background-color: #333;
            border-radius: 50%;
            border: 4px solid var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            font-size: 3rem;
            color: white;
            transition: transform 0.1s, background-color 0.2s;
        }

        .center-button:active {
            transform: translate(-50%, -50%) scale(0.9);
        }

        .level-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 5;
            font-weight: bold;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.visible {
            opacity: 1;
        }

        /* Guitar animation */
        @keyframes pluck {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }

        .shaking {
            animation: pluck 0.1s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="game-container" id="game-board">
        <div class="pad red" data-id="0"></div>
        <div class="pad blue" data-id="1"></div>
        <div class="pad yellow" data-id="2"></div>
        <div class="pad green" data-id="3"></div>
        <div class="level-display" id="level-count"></div>
        <div class="center-button" id="start-btn">▶️</div>
    </div>

    <div class="overlay" id="status-overlay"></div>

    <script>
        const pads = document.querySelectorAll('.pad');
        const startBtn = document.getElementById('start-btn');
        const levelCount = document.getElementById('level-count');
        const overlay = document.getElementById('status-overlay');
        const board = document.getElementById('game-board');

        let sequence = [];
        let playerSequence = [];
        let isPlaying = false;
        let isPlayerTurn = false;
        let audioCtx = null;

        // ... (rest of audio logic)

        // Guitar Frequencies (E2, A2, D3, G3)
        const frequencies = [82.41, 110.00, 146.83, 196.00];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playGuitarSound(index) {
            if (!audioCtx) return;
            
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequencies[index], now);
            
            // Plucked string envelope
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.5, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2000, now);
            filter.frequency.exponentialRampToValueAtTime(100, now + 1.5);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + 1.5);

            // Adding harmonics for "guitar-ish" timbre
            const h1 = audioCtx.createOscillator();
            const g1 = audioCtx.createGain();
            h1.type = 'sine';
            h1.frequency.setValueAtTime(frequencies[index] * 2, now);
            g1.gain.setValueAtTime(0, now);
            g1.gain.linearRampToValueAtTime(0.2, now + 0.02);
            g1.gain.exponentialRampToValueAtTime(0.01, now + 1);
            h1.connect(g1);
            g1.connect(audioCtx.destination);
            h1.start(now);
            h1.stop(now + 1);
        }

        function activatePad(index) {
            const pad = pads[index];
            pad.classList.add('active');
            playGuitarSound(index);
            setTimeout(() => {
                pad.classList.remove('active');
            }, 300);
        }

        async function playSequence() {
            isPlayerTurn = false;
            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 600));
                activatePad(sequence[i]);
            }
            isPlayerTurn = true;
        }

        function addToSequence() {
            sequence.push(Math.floor(Math.random() * 4));
            levelCount.textContent = sequence.length;
            playSequence();
        }

        function showOverlay(icon, duration = 1000) {
            overlay.textContent = icon;
            overlay.classList.add('visible');
            setTimeout(() => {
                overlay.classList.add('fade-out'); // Optional transition
                overlay.classList.remove('visible');
                overlay.classList.remove('fade-out');
            }, duration);
        }

        function startGame() {
            initAudio();
            sequence = [];
            playerSequence = [];
            isPlaying = true;
            startBtn.style.display = 'none';
            levelCount.textContent = '0';
            addToSequence();
        }

        function gameOver() {
            isPlaying = false;
            isPlayerTurn = false;
            levelCount.textContent = '';
            showOverlay('😕', 1500);
            setTimeout(() => {
                startBtn.textContent = '🔄';
                startBtn.style.display = 'flex';
            }, 1500);
        }

        function nextLevel() {
            playerSequence = [];
            showOverlay('😊', 800);
            setTimeout(() => {
                addToSequence();
            }, 1000);
        }

        pads.forEach(pad => {
            pad.addEventListener('click', () => {
                if (!isPlayerTurn) return;

                const id = parseInt(pad.getAttribute('data-id'));
                playerSequence.push(id);
                activatePad(id);

                if (playerSequence[playerSequence.length - 1] !== sequence[playerSequence.length - 1]) {
                    gameOver();
                    return;
                }

                if (playerSequence.length === sequence.length) {
                    nextLevel();
                }
            });
        });

        startBtn.addEventListener('click', () => {
            if (!isPlaying) {
                startGame();
            }
        });
        
        // Mobile tap fix
        document.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('pad') || e.target.id === 'start-btn') {
                e.preventDefault();
                e.target.click();
            }
        }, { passive: false });

    </script>
</body>
</html>
